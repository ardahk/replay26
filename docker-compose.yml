services:
  temporal:
    image: temporalio/temporal:1.31.0
    container_name: replay26-temporal
    command: server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - temporal-data:/home/temporal

volumes:
  temporal-data:
